<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AutoElite</title>
    <link rel="stylesheet" href="../style/common.css">
    <link rel="stylesheet" href="../style/connexion.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">AutoElite</a>
            <ul class="nav-links">
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="../content/produits.html">Nos Voitures</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Connexion</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="entrez votre adresse email">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required placeholder="entrez votre mot de passe">
                </div>
                
                <div class="show-password">
                    <input type="checkbox" id="showPasswordCheck">
                    <label for="showPasswordCheck">Afficher le mot de passe</label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
            </form>
            <p class="form-footer">Pas encore de compte ? <a href="../content/inscription.html">S'inscrire</a></p>
        </div>
    </main>

    <script src="../javascript/connexion.js"></script>
</body>
</html>
